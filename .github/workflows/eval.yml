name: API Evaluation

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run in test mode (no API calls)"
        required: false
        default: "false"
        type: boolean

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.test_mode }}" = "true" ]; then
            python -u eval/run_eval.py --test
          else
            python -u eval/run_eval.py
          fi
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval/results/
